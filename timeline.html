body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.6}

.legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.legend span{font-size:12px;color:var(--m)}
/* Timeline */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:#e5e7eb}
.tl-group{margin-bottom:8px}
.tl-date{font-size:12px;font-weight:700;color:var(--m);padding:12px 0 4px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 60%,transparent);z-index:1}
.tl-item{position:relative;padding:10px 14px;margin-bottom:2px;border-radius:8px;transition:.2s;display:flex;gap:10px;align-items:flex-start}
.tl-item:hover{background:rgba(0,0,0,.02)}
.tl-item::before{content:'';position:absolute;left:-25px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
.tl-item .icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.tl-item .repo{font-size:11px;font-weight:600;white-space:nowrap;padding:1px 6px;border-radius:6px;flex-shrink:0;margin-top:2px}
.tl-item .msg{font-size:13px;color:#444;flex:1}
.tl-item .sha{font-size:10px;color:#cbd5e1;font-family:monospace;flex-shrink:0;margin-top:3px}
/* Stats */
.stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:28px}
.stat{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat .num{font-size:24px;font-weight:700;color:var(--b)}
.stat .label{font-size:11px;color:var(--m)}
.foot{text-align:center;color:#cbd5e1;font-size:12px;padding:40px 0 0}
</style>
